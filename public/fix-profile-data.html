<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Profile Data - MASH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 32px;
            font-size: 15px;
            line-height: 1.6;
        }

        .data-section {
            background: #f7fafc;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .data-section h2 {
            color: #2d3748;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .data-label {
            color: #4a5568;
            font-weight: 500;
            font-size: 14px;
        }

        .data-value {
            color: #2d3748;
            font-size: 14px;
            text-align: right;
            word-break: break-word;
            max-width: 60%;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .status {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .status.info {
            background: #ebf8ff;
            color: #2c5282;
            border-left: 4px solid #3182ce;
        }

        .status.success {
            background: #f0fff4;
            color: #22543d;
            border-left: 4px solid #38a169;
        }

        .status.error {
            background: #fff5f5;
            color: #742a2a;
            border-left: 4px solid #e53e3e;
        }

        .log {
            background: #1a202c;
            color: #a0aec0;
            padding: 16px;
            border-radius: 6px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .log-entry {
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fix Profile Data</h1>
        <p class="subtitle">
            This tool will fix incorrect name parsing and missing email data in your cached profile.
            It will update both localStorage and Firestore with correct information.
        </p>

        <div id="status"></div>

        <div id="currentData" class="data-section" style="display: none;">
            <h2>Current Data (Before Fix)</h2>
            <div id="currentDataContent"></div>
        </div>

        <div id="fixedData" class="data-section" style="display: none;">
            <h2>Fixed Data (After Fix)</h2>
            <div id="fixedDataContent"></div>
        </div>

        <button class="button" onclick="fixProfileData()" id="fixButton">
            Fix Profile Data
        </button>

        <div id="log" class="log" style="display: none;"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, getDoc, updateDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBQ1r2ZHKorNknHpzBDeaLY8FXMM58CNL4",
            authDomain: "mash-ddf8d.firebaseapp.com",
            projectId: "mash-ddf8d",
            storageBucket: "mash-ddf8d.firebasestorage.app",
            messagingSenderId: "784415877696",
            appId: "1:784415877696:web:89853cbc7b1c54d6da4da5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let logs = [];
        function log(message) {
            logs.push(message);
            const logDiv = document.getElementById('log');
            logDiv.style.display = 'block';
            logDiv.innerHTML = logs.map(l => `<div class="log-entry">${l}</div>`).join('');
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
        }

        function displayData(data, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            Object.entries(data).forEach(([key, value]) => {
                const row = document.createElement('div');
                row.className = 'data-row';
                row.innerHTML = `
                    <span class="data-label">${key}:</span>
                    <span class="data-value">${value || '(empty)'}</span>
                `;
                container.appendChild(row);
            });
        }

        window.fixProfileData = async function() {
            log('Starting profile data fix...');
            const button = document.getElementById('fixButton');
            button.disabled = true;
            button.textContent = 'Fixing...';

            try {
                const user = auth.currentUser;
                if (!user) {
                    showStatus('Please sign in first', 'error');
                    log('ERROR: No user signed in');
                    button.disabled = false;
                    button.textContent = 'Fix Profile Data';
                    return;
                }

                log(`User authenticated: ${user.email}`);

                // Get current cached data
                const cachedData = localStorage.getItem('user');
                let currentData = cachedData ? JSON.parse(cachedData) : {};
                
                log('Current cached data:');
                log(JSON.stringify(currentData, null, 2));

                document.getElementById('currentData').style.display = 'block';
                displayData({
                    'Email': currentData.email,
                    'First Name': currentData.firstName,
                    'Last Name': currentData.lastName,
                    'Display Name': currentData.displayName
                }, 'currentDataContent');

                // Parse name correctly from Firebase displayName
                let firstName = '';
                let lastName = '';
                const displayName = user.displayName || '';

                if (displayName.includes(',')) {
                    // Format: "Last, First"
                    const parts = displayName.split(',').map(p => p.trim());
                    lastName = parts[0] || '';
                    firstName = parts[1] || '';
                    log(`Parsed name from "Last, First" format: firstName="${firstName}", lastName="${lastName}"`);
                } else {
                    // Format: "First Last"
                    const nameParts = displayName.split(' ').filter(p => p.length > 0);
                    firstName = nameParts[0] || '';
                    lastName = nameParts.slice(1).join(' ') || '';
                    log(`Parsed name from "First Last" format: firstName="${firstName}", lastName="${lastName}"`);
                }

                // Create fixed data
                const fixedData = {
                    id: user.uid,
                    email: user.email || '',
                    firstName: firstName,
                    lastName: lastName,
                    displayName: displayName,
                    phone: currentData.phone || '',
                    photoURL: user.photoURL || '',
                    avatar: user.photoURL || '',
                    provider: 'google',
                    emailVerified: user.emailVerified
                };

                log('Fixed data:');
                log(JSON.stringify(fixedData, null, 2));

                // Update localStorage
                localStorage.setItem('user', JSON.stringify(fixedData));
                log('Updated localStorage');

                // Update Firestore
                const userRef = doc(db, 'users', user.uid);
                const userDoc = await getDoc(userRef);

                if (userDoc.exists()) {
                    await updateDoc(userRef, {
                        email: fixedData.email,
                        firstName: fixedData.firstName,
                        lastName: fixedData.lastName,
                        displayName: fixedData.displayName,
                        photoURL: fixedData.photoURL,
                        updatedAt: new Date()
                    });
                    log('Updated existing Firestore document');
                } else {
                    await setDoc(userRef, {
                        ...fixedData,
                        createdAt: new Date(),
                        updatedAt: new Date(),
                        lastLoginAt: new Date()
                    });
                    log('Created new Firestore document');
                }

                document.getElementById('fixedData').style.display = 'block';
                displayData({
                    'Email': fixedData.email,
                    'First Name': fixedData.firstName,
                    'Last Name': fixedData.lastName,
                    'Display Name': fixedData.displayName
                }, 'fixedDataContent');

                showStatus('Profile data fixed successfully! Please reload the main app.', 'success');
                log('SUCCESS: Profile data fixed');

                button.textContent = 'Fixed Successfully';
                setTimeout(() => {
                    if (confirm('Profile fixed! Would you like to return to the main app?')) {
                        window.location.href = '/';
                    }
                }, 1000);

            } catch (error) {
                console.error('Fix error:', error);
                log(`ERROR: ${error.message}`);
                showStatus(`Error: ${error.message}`, 'error');
                button.disabled = false;
                button.textContent = 'Retry Fix';
            }
        };

        // Check auth state on load
        onAuthStateChanged(auth, (user) => {
            if (user) {
                log(`User signed in: ${user.email}`);
                showStatus(`Signed in as ${user.email}. Ready to fix profile data.`, 'info');
            } else {
                showStatus('Please sign in to fix your profile data.', 'error');
                log('No user signed in');
            }
        });
    </script>
</body>
</html>
