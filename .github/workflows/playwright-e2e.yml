name: Playwright E2E Tests

on:
  pull_request:
    branches: [main, develop, TESTING-&-SECURITY]
  workflow_dispatch:

jobs:
  playwright-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Non-blocking: E2E tests are informational
    continue-on-error: true
    
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: https://api.mashmarket.app/api/v1
          NEXT_PUBLIC_SANITY_PROJECT_ID: gerattrr
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: 2024-11-26
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'demo-key' }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: mash-ddf8d.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: mash-ddf8d

      - name: Run Playwright tests
        continue-on-error: true
        run: npm run test:e2e || echo "::warning::Some E2E tests failed"
        env:
          CI: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

