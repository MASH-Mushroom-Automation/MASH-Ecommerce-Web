name: Playwright E2E Tests

on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  playwright-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://api.mashmarket.app/api/v1' }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID || 'gerattrr' }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET || 'production' }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION || '2024-11-26' }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || 'mash-ddf8d.firebaseapp.com' }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || 'mash-ddf8d' }}

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true
          NEXT_PUBLIC_ENABLE_API_LOGGING: 'false'
      
      - name: Generate test report summary
        if: always()
        run: |
          echo "🎭 Playwright Test Results:"
          if [ -f "playwright-report/index.html" ]; then
            echo "  Report generated: playwright-report/index.html"
          fi
          echo "  Check artifacts for detailed results"

      - name: Upload Playwright Report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/**

# Notes:
# - This job runs Playwright e2e tests on PRs and on manual dispatch.
# - If you want visual snapshots, enable `npx playwright test --update-snapshots` in a separate job or locally.
