name: PR Checks

on:
  pull_request:
    branches: [main, develop, TESTING-&-SECURITY]
  workflow_dispatch:

# Cancel previous runs on same PR
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================
  # Lint Check - Non-blocking
  # ===========================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint || echo "::warning::Linting issues found"

  # ===========================================
  # TypeScript Check - Non-blocking
  # ===========================================
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit || echo "::warning::TypeScript errors found"

  # ===========================================
  # Unit Tests - Non-blocking
  # ===========================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - name: Run tests
        run: npm test -- --ci --maxWorkers=2 --testPathIgnorePatterns=./e2e/ || echo "::warning::Some tests failed"
        env:
          CI: true
          NEXT_PUBLIC_FIREBASE_API_KEY: test-key
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: test-project
          NEXT_PUBLIC_SANITY_PROJECT_ID: test-project

  # ===========================================
  # Build Check - REQUIRED
  # ===========================================
  build:
    name: Build
    runs-on: ubuntu-latest
    # This is the only required check
    
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: https://api.mashmarket.app/api/v1
          NEXT_PUBLIC_SANITY_PROJECT_ID: gerattrr
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: 2024-11-26
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'demo-key' }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: mash-ddf8d.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: mash-ddf8d
      - name: Verify build
        run: |
          if [ -d ".next" ]; then
            echo "✅ Build successful"
          else
            echo "❌ Build failed"
            exit 1
          fi

  # ===========================================
  # Security Audit - Non-blocking
  # ===========================================
  security:
    name: Security
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - name: Security audit
        run: npm audit --audit-level=critical || echo "::warning::Security vulnerabilities found"
