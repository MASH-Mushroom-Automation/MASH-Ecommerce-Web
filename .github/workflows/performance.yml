name: Performance Monitoring

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize]
  workflow_dispatch: # Allow manual trigger

jobs:
  # ============================================
  # Bundle Size Analysis
  # ============================================
  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for comparison
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build production bundle
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://api.mashmarket.app/api/v1' }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID || 'gerattrr' }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET || 'production' }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION || '2024-11-26' }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || 'mash-ddf8d.firebaseapp.com' }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || 'mash-ddf8d' }}
      
      - name: Analyze bundle size
        run: |
          echo "📦 Bundle Size Analysis"
          echo "======================="
          
          # Total build size
          TOTAL_SIZE=$(du -sh .next | cut -f1)
          TOTAL_MB=$(du -sm .next | cut -f1)
          echo "Total build: $TOTAL_SIZE ($TOTAL_MB MB)"
          
          # Static files size
          if [ -d ".next/static" ]; then
            STATIC_SIZE=$(du -sh .next/static | cut -f1)
            STATIC_MB=$(du -sm .next/static | cut -f1)
            echo "Static files: $STATIC_SIZE ($STATIC_MB MB)"
          fi
          
          # Largest chunks
          echo ""
          echo "🔍 Top 10 Largest Chunks:"
          find .next -name "*.js" -type f -exec du -h {} + | sort -hr | head -10 | nl
          
          # Export for summary
          echo "TOTAL_MB=$TOTAL_MB" >> $GITHUB_ENV
          echo "STATIC_MB=$STATIC_MB" >> $GITHUB_ENV
          
          # Check thresholds
          echo ""
          if [ "$TOTAL_MB" -gt 300 ]; then
            echo "::error::Build size ($TOTAL_SIZE) exceeds 300MB critical threshold!"
            exit 1
          elif [ "$TOTAL_MB" -gt 200 ]; then
            echo "::warning::Build size ($TOTAL_SIZE) exceeds 200MB warning threshold"
          else
            echo "✅ Build size is within acceptable range"
          fi
      
      - name: Compare with base branch
        if: github.event_name == 'pull_request'
        run: |
          echo "📊 Comparing with base branch..."
          
          # Checkout base branch
          git checkout ${{ github.base_ref }}
          npm ci
          npm run build
          
          BASE_SIZE=$(du -sm .next | cut -f1)
          PR_SIZE=${{ env.TOTAL_MB }}
          DIFF=$((PR_SIZE - BASE_SIZE))
          
          echo "Base branch size: ${BASE_SIZE}MB"
          echo "PR branch size: ${PR_SIZE}MB"
          echo "Difference: ${DIFF}MB"
          
          # Export for comment
          echo "BASE_SIZE=$BASE_SIZE" >> $GITHUB_ENV
          echo "DIFF=$DIFF" >> $GITHUB_ENV
          
          if [ "$DIFF" -gt 50 ]; then
            echo "::error::Bundle size increased by ${DIFF}MB (exceeds 50MB limit)"
            exit 1
          elif [ "$DIFF" -gt 20 ]; then
            echo "::warning::Bundle size increased by ${DIFF}MB"
          else
            echo "✅ Bundle size change is acceptable"
          fi
      
      - name: Comment bundle size on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const totalMB = process.env.TOTAL_MB;
            const staticMB = process.env.STATIC_MB;
            const baseMB = process.env.BASE_SIZE;
            const diff = process.env.DIFF;
            
            const diffSign = diff > 0 ? '+' : '';
            const diffEmoji = diff > 50 ? '🔴' : diff > 20 ? '🟡' : '🟢';
            
            const comment = `
            ## 📦 Bundle Size Report
            
            | Metric | Size |
            |--------|------|
            | **Total Build** | ${totalMB} MB |
            | **Static Files** | ${staticMB} MB |
            | **Base Branch** | ${baseMB} MB |
            | **Change** | ${diffEmoji} ${diffSign}${diff} MB |
            
            ${diff > 50 ? '⚠️ **Warning:** Bundle size increased significantly!' : ''}
            ${diff > 20 ? '⚠️ Consider optimizing bundle size' : ''}
            ${diff <= 0 ? '✅ Great job reducing bundle size!' : ''}
            
            <details>
            <summary>View bundle size thresholds</summary>
            
            - 🟢 **Acceptable:** < 20 MB increase
            - 🟡 **Warning:** 20-50 MB increase
            - 🔴 **Critical:** > 50 MB increase
            - ❌ **Blocked:** > 300 MB total
            
            </details>
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ============================================
  # Lighthouse CI - Performance Scoring
  # ============================================
  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build production bundle
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.12.x
          
          # Start production server in background
          npm run start &
          SERVER_PID=$!
          
          # Wait for server to be ready
          echo "Waiting for server to start..."
          npx wait-on http://localhost:3000 --timeout 60000
          
          # Run Lighthouse
          lhci autorun --collect.url=http://localhost:3000 \
                      --collect.numberOfRuns=3 \
                      --upload.target=temporary-public-storage || {
            echo "::warning::Lighthouse CI failed, but continuing..."
            kill $SERVER_PID
            exit 0
          }
          
          # Stop server
          kill $SERVER_PID
      
      - name: Check performance budgets
        run: |
          echo "🎯 Performance Budget Checks:"
          echo "  ⚠️ Manual review required for:"
          echo "  - Performance score > 80"
          echo "  - Accessibility score > 90"
          echo "  - Best Practices score > 90"
          echo "  - SEO score > 90"
          echo ""
          echo "📊 View full Lighthouse report in artifacts"

  # ============================================
  # Performance Summary
  # ============================================
  performance-summary:
    name: Performance Summary
    runs-on: ubuntu-latest
    needs: [bundle-analysis, lighthouse]
    if: always()
    
    steps:
      - name: Generate performance summary
        run: |
          echo "⚡ Performance Monitoring Summary:"
          echo "  Bundle Analysis: ${{ needs.bundle-analysis.result }}"
          echo "  Lighthouse CI: ${{ needs.lighthouse.result }}"
          
          if [[ "${{ needs.bundle-analysis.result }}" == "failure" ]]; then
            echo "::error::Bundle size check failed - review thresholds"
            exit 1
          fi
          
          echo "✅ Performance checks completed!"
