name: Run Tests

on:
  pull_request:
    branches: [main, develop, TESTING-&-SECURITY]
  push:
    branches: [main, develop, TESTING-&-SECURITY]
  workflow_dispatch: # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Run tests
        run: npm test -- --coverage --ci --maxWorkers=2
        env:
          CI: true

      - name: Run open-handle detection (PRs only)
        if: github.event_name == 'pull_request'
        run: npx jest --runInBand --detectOpenHandles --logHeapUsage --ci
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: ./coverage/lcov.info
          delete-old-comments: true
      
      - name: Check test pass rate
        run: |
          PASS_RATE=$(node -e "const coverage = require('./coverage/coverage-final.json'); const files = Object.values(coverage); const avgCoverage = files.reduce((acc, f) => acc + f.lines.pct, 0) / files.length; console.log(avgCoverage);")
          echo "Test pass rate: $PASS_RATE%"
          if (( $(echo "$PASS_RATE < 80" | bc -l) )); then
            echo "❌ Test coverage below 80% threshold"
            exit 1
          fi
          echo "✅ Test coverage meets 80%+ threshold"
