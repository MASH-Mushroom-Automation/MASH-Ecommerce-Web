name: Run Tests

on:
  pull_request:
    branches: [main, develop, TESTING-&-SECURITY]
  push:
    branches: [main, develop, TESTING-&-SECURITY]
  workflow_dispatch: # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Run tests
        run: npm test -- --coverage --ci --maxWorkers=2 --testPathIgnorePatterns=./e2e/
        env:
          CI: true
          # Test environment Firebase configuration (uses mock/test values)
          NEXT_PUBLIC_FIREBASE_API_KEY: test-api-key-for-jest
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: test-project.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: test-project
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: test-project.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 123456789
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:123456789:web:abc123
          # Test environment Sanity configuration
          NEXT_PUBLIC_SANITY_PROJECT_ID: test-project
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: 2024-11-26
          NEXT_PUBLIC_API_URL: https://api.mashmarket.app/api/v1
      
      - name: Generate coverage summary
        run: |
          if [ -f "coverage/coverage-summary.json" ]; then
            echo "📊 Coverage Summary:"
            node -e "
              const coverage = require('./coverage/coverage-summary.json');
              const total = coverage.total;
              console.log('  Lines: ' + total.lines.pct.toFixed(2) + '%');
              console.log('  Statements: ' + total.statements.pct.toFixed(2) + '%');
              console.log('  Functions: ' + total.functions.pct.toFixed(2) + '%');
              console.log('  Branches: ' + total.branches.pct.toFixed(2) + '%');
            "
          fi

      - name: Run open-handle detection (PRs only)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: npx jest --runInBand --detectOpenHandles --logHeapUsage --ci --testPathIgnorePatterns=./e2e/
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: ./coverage/lcov.info
          delete-old-comments: true
      
      - name: Check test pass rate
        run: |
          if [ -f "coverage/coverage-summary.json" ]; then
            COVERAGE=$(node -e "
              const c = require('./coverage/coverage-summary.json');
              const avg = (c.total.lines.pct + c.total.statements.pct + c.total.functions.pct + c.total.branches.pct) / 4;
              console.log(avg.toFixed(2));
            ")
            echo "Average coverage: $COVERAGE%"
            # Warn but don't fail if coverage is low - coverage threshold is informational
            if [ "$(echo "$COVERAGE < 50" | bc -l)" -eq 1 ]; then
              echo "::warning::Coverage ($COVERAGE%) is below 50%"
            else
              echo "✅ Coverage is acceptable"
            fi
          else
            echo "::warning::No coverage report found"
          fi
