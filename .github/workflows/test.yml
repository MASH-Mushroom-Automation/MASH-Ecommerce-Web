name: Run Tests

on:
  pull_request:
    branches: [main, develop, TESTING-&-SECURITY]
  push:
    branches: [main, develop, TESTING-&-SECURITY]
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    # Non-blocking: tests are informational
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        continue-on-error: true
        run: npm run lint || echo "::warning::Linting issues found"
      
      - name: Run tests
        continue-on-error: true
        run: npm test -- --coverage --ci --maxWorkers=2 --testPathIgnorePatterns=./e2e/
        env:
          CI: true
          NEXT_PUBLIC_FIREBASE_API_KEY: test-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: test-project
          NEXT_PUBLIC_SANITY_PROJECT_ID: test-project
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: 2024-11-26
          NEXT_PUBLIC_API_URL: https://api.mashmarket.app/api/v1
      
      - name: Test summary
        run: |
          echo "✅ Test job completed"
          if [ -f "coverage/coverage-summary.json" ]; then
            echo "📊 Coverage report generated"
          else
            echo "::notice::No coverage report found"
          fi
