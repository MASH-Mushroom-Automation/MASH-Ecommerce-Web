name: Build Check

on:
  push:
    branches: [main, develop]    # build for deployment only
  workflow_dispatch:

# prevent overlapping builds on the same ref
early concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production
          # Use hardcoded defaults for CI - works without secrets
          NEXT_PUBLIC_API_URL: https://api.mashmarket.app/api/v1
          NEXT_PUBLIC_SANITY_PROJECT_ID: gerattrr
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: 2024-11-26
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'demo-key-for-build' }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: mash-ddf8d.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: mash-ddf8d
      
      - name: Verify build output
        run: |
          if [ ! -d ".next" ]; then
            echo "❌ Build failed: .next directory not found"
            exit 1
          fi
          echo "✅ Build successful"
          echo "📦 Build size: $(du -sh .next | cut -f1)"

