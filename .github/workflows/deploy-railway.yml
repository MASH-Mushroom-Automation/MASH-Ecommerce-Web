name: Deploy to Railway

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # Pre-deployment validation
  validate:
    name: Validate Before Deploy
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - run: npm ci
      
      - name: Build check
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: https://api.mashmarket.app/api/v1
          NEXT_PUBLIC_SANITY_PROJECT_ID: gerattrr
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: 2024-11-26
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'demo-key' }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: mash-ddf8d.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: mash-ddf8d
      
      - name: Deployment info
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "🚀 Ready for PRODUCTION deployment"
            echo "   → https://www.mashmarket.app"
          else
            echo "🚀 Ready for DEVELOPMENT deployment"
            echo "   → https://beta.mashmarket.app"
          fi
          echo ""
          echo "Railway deploys automatically via GitHub integration"

# Note: Railway deployment is triggered automatically via GitHub integration.
# This workflow validates the build before Railway attempts deployment.


